<html lang="zh-CN">
<head>

  <title>Private Itinerary</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #17202e;
      background: linear-gradient(135deg, #f8f5ec 0%, #e9f1f3 58%, #f6e8df 100%);
    }
    main {
      width: min(420px, 100%);
      padding: 28px;
      border: 1px solid rgba(23, 32, 46, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 22px 70px rgba(23, 32, 46, 0.16);
      backdrop-filter: blur(16px);
    }

    p { margin: 0 0 20px; color: #5d6878; line-height: 1.55; }
    form { display: grid; gap: 12px; }
    label { font-weight: 800; }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(23, 32, 46, 0.22);
      border-radius: 6px;
      padding: 10px 12px;
      color: #17202e;
      background: #fff;
      font: inherit;
    }
    input:focus { outline: 3px solid rgba(198, 139, 49, 0.32); border-color: #c68b31; }
    button {
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: #256c86;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }
    button:disabled { cursor: wait; opacity: 0.7; }
    .message { min-height: 1.5em; margin: 0; font-weight: 750; color: #9d2d24; }
    @media (prefers-color-scheme: dark) {
      body { color: #f4f6f8; background: linear-gradient(135deg, #111827 0%, #17313a 58%, #42271d 100%); }
      main { border-color: rgba(255, 255, 255, 0.16); background: rgba(17, 24, 39, 0.76); }
      p { color: rgba(244, 246, 248, 0.72); }
      input { color: #f4f6f8; background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.22); }
      .message { color: #ffc7bd; }
    }
  </style>

  <script>
    const form = document.querySelector('#unlock-form');
    const input = document.querySelector('#password');
    const button = document.querySelector('#unlock-button');
    const message = document.querySelector('#message');
    const payload = JSON.parse(document.querySelector('#encrypted-payload').textContent);

    function fromBase64(value) {
      return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
    }

    async function deriveKey(password) {
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: fromBase64(payload.salt), iterations: payload.iterations, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function decompressGzip(bytes) {
      if (!('DecompressionStream' in window)) {
        throw new Error('This browser does not support encrypted itinerary decompression.');
      }
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return new Response(stream).text();
    }

    async function decryptPage(password) {
      const key = await deriveKey(password);
      const ciphertext = fromBase64(payload.data);
      const tag = fromBase64(payload.tag);
      const combined = new Uint8Array(ciphertext.length + tag.length);
      combined.set(ciphertext);
      combined.set(tag, ciphertext.length);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromBase64(payload.iv) }, key, combined);
      const bytes = new Uint8Array(plain);
      return payload.compression === 'gzip' ? decompressGzip(bytes) : new TextDecoder().decode(bytes);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      button.disabled = true;
      button.textContent = 'Unlocking...';
      try {
        const html = await decryptPage(input.value);
        sessionStorage.setItem('greece-itinerary-authorized', 'true');
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        input.value = '';
        message.textContent = error.message.includes('decompression') ? error.message : 'Password is incorrect.';
        input.focus();
      } finally {
        button.disabled = false;
        button.textContent = 'Unlock';
      }
    });
  </script>
</body>
</html>
